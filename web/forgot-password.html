<!DOCTYPE html>
<html lang="tr" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OMR Optik Form Okuma Sistemi — Şifremi Unuttum">
    <title>OMR Sistemi — Şifremi Unuttum</title>
    <!-- Özel Stiller -->
        <script src="./runtime-config.js"></script>
    <link rel="stylesheet" href="./style.css">
    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: url('./omr-login-bg.png') center/cover no-repeat fixed;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            margin: 0;
            padding: 0;
        }

        .login-main {
            display: flex;
            align-items: center;
            justify-content: center;
            flex: 1;
            min-height: 100vh;
            width: 100%;
            position: relative;
            padding: 2rem 0;
        }

        /* ===================== SAĞ PANEL — Form ===================== */
        .login-right {
            width: 100%;
            max-width: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: relative;
            z-index: 2;
        }

        .login-form-wrapper {
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        /* Form Alanları */
        .input-group {
            position: relative;
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #78909c;
            font-size: 1.25rem;
            pointer-events: none;
            transition: color 0.3s;
        }

        .input-group input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 1px solid rgba(144, 164, 174, 0.4);
            border-radius: 12px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.8);
            color: #263238;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            margin: 0;
        }

        .input-group input:focus {
            outline: none;
            border-color: #2e9e6e;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(46, 158, 110, 0.1);
        }

        .input-group input:focus + i {
            color: #2e9e6e;
        }

        /* Giriş Butonu */
        .login-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #2e9e6e, #4a90a4);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(46, 158, 110, 0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(46, 158, 110, 0.35);
        }

        /* ===================== FOOTER ===================== */
        .site-footer {
            background: rgba(15, 25, 35, 0.85); /* Yarı saydam footer */
            backdrop-filter: blur(15px);
            color: #b0bec5;
            padding: 1.5rem 2rem 1rem 2rem;
            display: flex;
            margin-top: auto;
            justify-content: center;
            gap: 5rem;
            flex-wrap: wrap;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .footer-section {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            min-width: 150px;
        }

        .footer-section h3 {
            color: #ffffff;
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: 0.5px;
        }

        .footer-section a {
            color: #90a4ae;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .footer-section a:hover {
            color: #2e9e6e;
        }

        .footer-bottom {
            background: rgba(10, 15, 20, 0.9);
            text-align: center;
            padding: 1rem;
            color: #546e7a;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        /* Dark mode uyumluluğu */
        [data-theme="dark"] .login-right {
            background: rgba(20, 30, 40, 0.7);
            border-color: rgba(255, 255, 255, 0.1);
        }
        [data-theme="dark"] .input-group input {
            background: rgba(15, 23, 42, 0.6);
            color: #f8fafc;
            border-color: rgba(255, 255, 255, 0.1);
        }
        [data-theme="dark"] .input-group input:focus {
            background: rgba(15, 23, 42, 0.9);
            border-color: #38bdf8;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }
        [data-theme="dark"] .login-btn {
            background: linear-gradient(135deg, #0ea5e9, #3b82f6);
            box-shadow: 0 8px 20px rgba(14, 165, 233, 0.25);
        }
    </style>
</head>

<body>

    <!-- ==================== HEADER ==================== -->
    <header class="top-header">
        <nav style="justify-content: flex-end; gap: 0.5rem;">
            <button class="lang-toggle">
                <i class="ph ph-globe"></i> <span class="lang-text">EN</span>
            </button>
        </nav>
    </header>

    <main class="login-main">
        <div class="login-right">
            <div class="login-form-wrapper">
                <div style="width: 70px; height: 70px; border-radius: 50%; background: #e0f2fe; color: #0284c7; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 1.5rem;">
                    <i class="ph ph-envelope-simple"></i>
                </div>
                
                <h1 style="font-size: 1.5rem; font-weight: 600; color: #1a2e3b; margin-bottom: 0.5rem;" data-i18n="forgot_pwd">Şifremi Unuttum</h1>
                <p style="color: #78909c; font-size: 0.95rem; margin-bottom: 2rem;" data-i18n="forgot_pwd_desc">Lütfen sisteme kayıtlı e-posta adresinizi girin. Şifre sıfırlama bağlantınızı göndereceğiz.</p>
                
                <form id="forgotPwdForm">
                    <div class="input-group">
                        <input type="email" id="resetEmail" name="email" required data-i18n-placeholder="email_placeholder" placeholder="E-posta adresiniz">
                        <i class="ph ph-user"></i>
                    </div>
                    
                    <div id="forgotPwdAlert" style="display: none; padding: 0.75rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.875rem; text-align: left; align-items: center; gap: 0.5rem;">
                        <i class="ph"></i> <span></span>
                    </div>

                    <button type="submit" id="resetBtn" class="login-btn" style="margin-bottom: 1.5rem;">
                        <span class="btn-text" data-i18n="send_reset_link">Sıfırlama Linki Gönder</span>
                    </button>

                    <a href="./login.html" style="color: var(--pico-primary); text-decoration: none; font-weight: 500; font-size: 0.9rem;">
                        <i class="ph ph-arrow-left"></i> <span data-i18n="back_to_login">Giriş Ekranına Dön</span>
                    </a>
                </form>
            </div>
        </div>
    </main>

    <!-- ==================== FOOTER ==================== -->
    <footer class="site-footer" style="justify-content:center; padding: 1rem 2rem;">
        <div style="color: rgba(255,255,255,0.85); font-size: 0.85rem; text-align: center;">
            &copy; 2026 İstinye Üniversitesi — BST210 ·
            <a href="mailto:omr@istinye.edu.tr" style="color: inherit; text-decoration: underline;">
                <i class="ph ph-envelope" style="vertical-align: -2px;"></i>
                <span data-i18n="footer_support">Destek</span>
            </a>
        </div>
    </footer>

    <script type="module">
        import { initLanguage, USE_MOCK, apiFetch } from './auth.js?v=2';
        
        // Tema ayarını localStorage'dan al
        const savedTheme = localStorage.getItem('omr_theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        document.getElementById('forgotPwdForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value.trim();
            const alertBox = document.getElementById('forgotPwdAlert');
            const alertIcon = alertBox.querySelector('i');
            const alertText = alertBox.querySelector('span');
            const btn = document.getElementById('resetBtn');

            btn.style.opacity = '0.7';
            btn.style.cursor = 'not-allowed';
            alertBox.style.display = 'none';

            if (USE_MOCK) {
                setTimeout(() => {
                    btn.style.opacity = '1';
                    btn.style.cursor = 'pointer';
                    alertBox.style.display = 'flex';
                    
                    const storedMockUsers = localStorage.getItem('omr_mock_users');
                    let found = false;
                    
                    if (email === 'admin@omr.local' || email === 'ogretmen@omr.local' || email === 'vedat@omr.local' || email === 'emrecan@omr.local') {
                        found = true;
                    } else if (storedMockUsers) {
                        try {
                            const parsed = JSON.parse(storedMockUsers);
                            if (parsed.find(u => u.email === email)) found = true;
                        } catch(err) {}
                    }

                    if (found) {
                        alertBox.style.backgroundColor = '#dcfce7';
                        alertBox.style.color = '#166534';
                        alertIcon.className = 'ph ph-check-circle';
                        alertText.textContent = window.t ? window.t('reset_success') : 'Şifre sıfırlama bağlantısı e-postanıza gönderildi!';
                        document.getElementById('resetEmail').value = '';
                    } else {
                        alertBox.style.backgroundColor = '#fee2e2';
                        alertBox.style.color = '#991b1b';
                        alertIcon.className = 'ph ph-warning-circle';
                        alertText.textContent = window.t ? window.t('reset_fail') : 'Bu e-posta adresiyle eşleşen bir kullanıcı bulunamadı!';
                    }
                }, 800);
            } else {
                // Gerçek API Entegrasyonu (SMTP Gönderimi)
                apiFetch('/api/auth/forgot-password', {
                    method: 'POST',
                    body: JSON.stringify({ email })
                })
                .then(data => {
                    btn.style.opacity = '1';
                    btn.style.cursor = 'pointer';
                    alertBox.style.display = 'flex';
                    alertBox.style.backgroundColor = '#dcfce7';
                    alertBox.style.color = '#166534';
                    alertIcon.className = 'ph ph-check-circle';
                    alertText.textContent = window.t ? window.t('reset_success') : 'Şifre sıfırlama bağlantısı e-postanıza gönderildi!';
                    document.getElementById('resetEmail').value = '';
                })
                .catch(err => {
                    btn.style.opacity = '1';
                    btn.style.cursor = 'pointer';
                    alertBox.style.display = 'flex';
                    alertBox.style.backgroundColor = '#fee2e2';
                    alertBox.style.color = '#991b1b';
                    alertIcon.className = 'ph ph-warning-circle';
                    
                    let errorMsg = window.t ? window.t('reset_fail') : 'Bu e-posta adresiyle eşleşen bir kullanıcı bulunamadı!';
                    alertText.textContent = errorMsg;
                });
            }
        });
    </script>
</body>

</html>
